---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: django-pdb
  namespace: tourismo
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: django
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nginx-pdb
  namespace: tourismo
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: nginx
