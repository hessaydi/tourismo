services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@clcdream.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - traefik_net

  postgres:
    image: postgres:17-alpine
    container_name: tourismo_postgres
    environment:
      POSTGRES_DB: tourismo
      POSTGRES_USER: tourismo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tourismo"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build: .
    container_name: tourismo_django
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-tourismo.clcdream.com,localhost}
      DB_ENGINE: postgresql
      DB_NAME: tourismo
      DB_USER: tourismo
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_HOST: postgres
      DB_PORT: "5432"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: tourismo_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - django
    networks:
      - internal
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tourismo.rule=Host(`tourismo.clcdream.com`)"
      - "traefik.http.routers.tourismo.entrypoints=websecure"
      - "traefik.http.routers.tourismo.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tourismo-http.rule=Host(`tourismo.clcdream.com`)"
      - "traefik.http.routers.tourismo-http.entrypoints=web"
      - "traefik.http.routers.tourismo-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.services.tourismo.loadbalancer.server.port=80"
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  static_data:
  letsencrypt:

networks:
  traefik_net:
    external: false
  internal:
    external: false
